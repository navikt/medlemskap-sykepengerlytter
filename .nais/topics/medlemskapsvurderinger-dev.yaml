apiVersion: kafka.nais.io/v1
kind: Topic
metadata:
  name: medlemskapsvurderinger
  namespace: medlemskap
  labels:
    team: medlemskap
spec:
  pool: nav-dev
  config:
    cleanupPolicy: delete
    minimumInSyncReplicas: 1
    partitions: 2
    replication: 3
    retentionBytes: -1
    retentionHours: 72
  acl:
    - team: medlemskap
      application: medlemskap-sykepenger-listener
      access: readwrite
    - team: tbd
      application: sparkel-medlemskap
      access: read